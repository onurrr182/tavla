<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Backgammon</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #1a3a52 0%, #2c5f6f 100%);
            color: white;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            font-size: 2.5rem;
            margin: 10px 0 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #board {
            display: flex;
            flex-direction: column;
            width: 800px;
            max-width: 95vw;
            margin: 30px auto;
            background: linear-gradient(135deg, #8B6F47 0%, #A0826D 50%, #8B6F47 100%);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 8px solid #5d4e37;
        }
        .board-row {
            display: flex;
            gap: 3px;
            margin-bottom: 3px;
        }
        .board-row:last-child {
            margin-bottom: 0;
        }
        .point {
            width: 45px;
            height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 0 0 8px 8px;
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            border: 2px solid #444;
        }
        .point:nth-child(odd) {
            background: linear-gradient(135deg, #3a3a3a 0%, #555 100%);
        }
        .point:hover {
            filter: brightness(1.15);
            transform: translateY(-2px);
        }
        .point.selected {
            background: linear-gradient(135deg, #4a9eff 0%, #2e7fd9 100%);
            box-shadow: inset 0 0 20px rgba(74, 158, 255, 0.5);
            transform: scale(1.05);
        }
        .point small {
            position: absolute;
            bottom: 2px;
            color: #aaa;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .checker {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            margin: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.4), inset 2px 2px 5px rgba(255,255,255,0.2), 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.15s ease;
        }
        .checker:hover {
            transform: scale(1.1);
        }
        .white {
            background: radial-gradient(circle at 30% 30%, #fff, #e8d5b7);
            border: 2px solid #d4af37;
            color: #333;
        }
        .black {
            background: radial-gradient(circle at 30% 30%, #444, #1a1a1a);
            border: 2px solid #666;
            color: #ddd;
        }
        #setup, #game-info {
            background: rgba(26, 42, 58, 0.9);
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            margin: 30px auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        #setup p, #game-info p {
            margin: 10px 0;
            font-size: 1rem;
        }
        #dice-container {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        #dice-val {
            display: block;
            font-size: 1.5rem;
            margin-top: 10px;
            font-weight: bold;
        }
        input {
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            border: 2px solid #27ae60;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 250px;
            margin: 10px auto;
        }
        input:focus {
            outline: none;
            border-color: #2ecc71;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
        }
        input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            border: none;
            margin: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }
        button:hover {
            background: linear-gradient(135deg, #229954 0%, #27ae60 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Backgammon P2P</h1>

    <div id="setup">
        <button onclick="createGame()">Create Game (Host)</button>
        <p>OR</p>
        <input type="text" id="joinId" placeholder="Enter 4-Letter ID">
        <button onclick="joinGame()">Join Game</button>
    </div>

    <div id="game-info" class="hidden">
        <p>Your ID: <strong id="display-id">...</strong></p>
        <p id="status">Waiting for player...</p>
        <div id="dice-container">
            <button id="roll-btn" onclick="rollDice()">Roll Dice</button>
            <span id="dice-val"></span>
        </div>
    </div>

    <div id="board" class="hidden"></div>

    <script>
        let peer, conn;
        let myRole = 'host'; // default for local play
        let gameState = {
            board: [2,0,0,0,0,-5,0,-3,0,0,0,5,-5,0,0,0,3,0,5,0,0,0,0,-2], // Standard start
            turn: 'host',
            bar: {white: 0, black: 0}
        };

        // --- P2P Logic ---
        function createGame() {
            const id = Math.random().toString(36).substring(2, 6).toUpperCase();
            initPeer(id);
            myRole = 'host';
            document.getElementById('display-id').innerText = id;
        }

        function joinGame() {
            const id = document.getElementById('joinId').value.toUpperCase();
            initPeer();
            myRole = 'guest';
            setTimeout(() => {
                conn = peer.connect(id);
                setupConn();
            }, 1000);
        }

        function initPeer(id = null) {
            peer = id ? new Peer(id) : new Peer();
            peer.on('open', (myId) => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game-info').classList.remove('hidden');
                document.getElementById('board').classList.remove('hidden');
                renderBoard();
                if(!id) document.getElementById('display-id').innerText = "Connecting...";
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConn();
            });
        }

        function setupConn() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "Connected! Game On.";
                renderBoard();
            });
            conn.on('data', (data) => {
                gameState = data;
                renderBoard();
            });
        }

        // --- Game Logic ---
        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            // Top row: points 13-24 (indices 12-23), right to left
            const topRow = document.createElement('div');
            topRow.className = 'board-row';
            topRow.style.flexDirection = 'row-reverse';
            for(let i=23; i>=12; i--) {
                const pt = createPoint(i);
                topRow.appendChild(pt);
            }
            boardDiv.appendChild(topRow);
            // Bar
            const bar = document.createElement('div');
            bar.className = 'point';
            bar.style.height = '260px';
            bar.style.margin = '0 0';
            bar.innerHTML = '<small style="top: 5px; bottom: auto;">BAR</small>';
            const barWhite = gameState.bar.white;
            const barBlack = gameState.bar.black;
            bar.style.display = 'flex';
            bar.style.flexDirection = 'column';
            bar.style.justifyContent = 'space-around';
            const whiteBarDiv = document.createElement('div');
            whiteBarDiv.style.display = 'flex';
            whiteBarDiv.style.flexDirection = 'column';
            whiteBarDiv.style.alignItems = 'center';
            for(let n=0; n<barWhite; n++) {
                const checker = document.createElement('div');
                checker.className = 'checker white';
                whiteBarDiv.appendChild(checker);
            }
            bar.appendChild(whiteBarDiv);
            const blackBarDiv = document.createElement('div');
            blackBarDiv.style.display = 'flex';
            blackBarDiv.style.flexDirection = 'column';
            blackBarDiv.style.alignItems = 'center';
            for(let n=0; n<barBlack; n++) {
                const checker = document.createElement('div');
                checker.className = 'checker black';
                blackBarDiv.appendChild(checker);
            }
            bar.appendChild(blackBarDiv);
            boardDiv.appendChild(bar);
            // Bottom row: points 1-12 (indices 0-11), left to right
            const bottomRow = document.createElement('div');
            bottomRow.className = 'board-row';
            for(let i=0; i<12; i++) {
                const pt = createPoint(i);
                bottomRow.appendChild(pt);
            }
            boardDiv.appendChild(bottomRow);
            const status = document.getElementById('status').innerText = `Turn: ${gameState.turn.toUpperCase()}`;
        }

        function createPoint(i) {
            const pt = document.createElement('div');
            pt.className = 'point';
            pt.setAttribute('data-index', i);
            pt.innerHTML = `<small style="position:absolute; bottom:0; color:#999">${i+1}</small>`;
            const val = gameState.board[i];
            const count = Math.abs(val);
            const color = val > 0 ? 'white' : 'black';
            pt.style.flexDirection = (i < 12) ? 'column' : 'column-reverse';
            for(let n=0; n<count; n++) {
                const checker = document.createElement('div');
                checker.className = `checker ${color}`;
                pt.appendChild(checker);
            }
            pt.onclick = () => handlePointClick(i);
            return pt;
        }

        let selectedPoint = null;
        function handlePointClick(i) {
            if (gameState.turn !== myRole) return;

            if (selectedPoint === null) {
                if (gameState.board[i] === 0) return;
                selectedPoint = i;
                document.querySelector(`.point[data-index="${i}"]`).classList.add('selected');
            } else {
                // Move logic (Basic - no rules enforced yet)
                const piece = gameState.board[selectedPoint] > 0 ? 1 : -1;
                gameState.board[selectedPoint] -= piece;
                gameState.board[i] += piece;
                
                gameState.turn = (myRole === 'host') ? 'guest' : 'host';
                document.querySelector(`.point[data-index="${selectedPoint}"]`).classList.remove('selected');
                selectedPoint = null;
                sync();
            }
        }

        function rollDice() {
            if (gameState.turn !== myRole) return;
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-val').innerText = `🎲 ${d1} , ${d2}`;
        }

        function sync() {
            renderBoard();
            if(conn) conn.send(gameState);
        }
    </script>
</body>
</html>
