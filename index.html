<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgammon P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background: #2a2420;
            color: white;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }
        
        h1 {
            font-size: 2.5rem;
            margin: 10px 0 20px;
            color: #d4af37;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        #board {
            width: 900px;
            max-width: 95vw;
            margin: 30px auto;
            background: linear-gradient(90deg, 
                #8B7355 0%,
                #9D8B72 2.5%,
                #7A6B52 5%,
                #8B7355 7.5%,
                #A89470 10%,
                #8B7355 12.5%,
                #9D8B72 15%,
                #7A6B52 17.5%,
                #8B7355 20%,
                #A89470 22.5%,
                #8B7355 25%,
                #9D8B72 27.5%,
                #7A6B52 30%,
                #8B7355 32.5%,
                #A89470 35%,
                #8B7355 37.5%,
                #9D8B72 40%,
                #7A6B52 42.5%,
                #8B7355 45%,
                #A89470 47.5%,
                #8B7355 50%,
                #9D8B72 52.5%,
                #7A6B52 55%,
                #8B7355 57.5%,
                #A89470 60%,
                #8B7355 62.5%,
                #9D8B72 65%,
                #7A6B52 67.5%,
                #8B7355 70%,
                #A89470 72.5%,
                #8B7355 75%,
                #9D8B72 77.5%,
                #7A6B52 80%,
                #8B7355 82.5%,
                #A89470 85%,
                #8B7355 87.5%,
                #9D8B72 90%,
                #7A6B52 92.5%,
                #8B7355 95%,
                #A89470 97.5%,
                #8B7355 100%
            );
            padding: 15px;
            border-radius: 0;
            border: 24px solid #54483d;
            box-shadow: 0 40px 100px rgba(0,0,0,0.95), inset 0 1px 0 rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        
        .board-row {
            display: flex;
            gap: 0;
            height: 240px;
            flex: 1;
            position: relative;
        }
        
        .point {
            flex: 1;
            position: relative;
            cursor: pointer;
            transition: filter 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            background: transparent;
            border-right: 1px solid #3a3a30;
        }
        
        .triangle-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .point:hover .triangle-svg {
            filter: drop-shadow(0 4px 8px rgba(212,175,55,0.5)) brightness(1.1);
        }
        
        .point.selected .triangle-svg {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.9)) brightness(1.2);
        }
        
        .checkers {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            width: 50px;
            pointer-events: none;
            position: relative;
            z-index: 20;
            margin-top: 8px;
        }
        
        .bottom-half .checkers {
            flex-direction: column-reverse;
            margin-top: 0;
            margin-bottom: 8px;
        }
        
        .checker {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 18px rgba(0,0,0,0.55);
            cursor: grab;
            pointer-events: auto;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            position: relative;
            margin: -20px 0;
            border: 1px solid rgba(0,0,0,0.25);
        }
        
        .checker:hover {
            transform: scale(1.12) translateY(-3px);
            box-shadow: 
                0 14px 28px rgba(0,0,0,0.8),
                inset -2px -2px 6px rgba(0,0,0,0.18);
        }

        .checker.white {
            background: radial-gradient(circle at 35% 25%, #ffffff 0%, #f1f1f1 40%, #dcdcdc 100%);
        }

        .checker.black {
            background: radial-gradient(circle at 35% 25%, #222222 0%, #111111 45%, #000000 100%);
        }
        
        .checker:active {
            cursor: grabbing;
        }
        
        .white {
            background: radial-gradient(circle at 35% 35%, #FFFAF0 0%, #F5E6D3 20%, #E0CCAD 50%, #D4B896 85%, #C9A961 100%);
            border: 5px solid #B39F6F;
            box-shadow: 
                0 6px 12px rgba(0,0,0,0.4),
                inset -1px -1px 3px rgba(0,0,0,0.2),
                inset 1px 1px 3px rgba(255,255,255,0.4);
        }
        
        .black {
            background: radial-gradient(circle at 35% 35%, #4a4a3a 0%, #252517 30%, #0f0f08 65%, #000000 100%);
            border: 5px solid #1a1a0a;
            box-shadow: 
                0 6px 12px rgba(0,0,0,0.6),
                inset -1px -1px 3px rgba(0,0,0,0.4),
                inset 1px 1px 3px rgba(255,255,255,0.1);
        }
        
        .point-label {
            position: absolute;
            font-size: 0.5rem;
            font-weight: bold;
            color: rgba(255,255,255,0.15);
            z-index: 25;
            bottom: 2px;
        }
        
        .top-half .point-label {
            top: 2px;
            bottom: auto;
        }
        
        #setup, #game-info {
            background: linear-gradient(135deg, #2a2a3a 0%, #3a3a4a 100%);
            padding: 30px;
            border-radius: 8px;
            max-width: 380px;
            margin: 30px auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 3px solid #d4af37;
        }
        
        #setup p, #game-info p {
            margin: 12px 0;
            font-size: 0.95rem;
        }
        
        #display-id {
            color: #d4af37;
            font-family: monospace;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }
        
        #status {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        #dice-container {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            border: 1px solid #d4af3755;
        }
        
        #dice-val {
            display: block;
            font-size: 1.5rem;
            margin-top: 10px;
            color: #d4af37;
            letter-spacing: 2px;
            font-weight: bold;
        }
        
        input {
            padding: 10px 12px;
            font-size: 0.95rem;
            border-radius: 4px;
            border: 2px solid #d4af37;
            background: rgba(212, 175, 55, 0.08);
            color: white;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 250px;
            margin: 10px auto;
            text-transform: uppercase;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        input:focus {
            outline: none;
            border-color: #f0e68c;
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        button {
            padding: 11px 28px;
            font-size: 0.95rem;
            border-radius: 4px;
            border: 2px solid #d4af37;
            margin: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #d4af37 0%, #dcc068 100%);
            color: #1a1410;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        
        button:hover {
            background: linear-gradient(135deg, #dcc068 0%, #d4af37 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.45);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .point.selected {
            filter: opacity(1) drop-shadow(0 0 20px rgba(212, 175, 55, 1));
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>BACKGAMMON</h1>
    
    <div id="setup">
        <button onclick="createGame()">Create Game (Host)</button>
        <p>OR</p>
        <input type="text" id="joinId" placeholder="Enter 4-Letter ID">
        <button onclick="joinGame()">Join Game</button>
    </div>
    
    <div id="game-info" class="hidden">
        <p>Your ID: <strong id="display-id">...</strong></p>
        <p id="status">Waiting for player...</p>
        <div id="dice-container">
            <button id="roll-btn" onclick="rollDice()">Roll Dice</button>
            <span id="dice-val"></span>
        </div>
    </div>
    
    <div id="board" class="hidden"></div>
    
    <script>
        let peer, conn;
        let myRole = 'host';
        let gameState = {
            board: [2,0,0,0,0,-5,0,-3,0,0,0,5,-5,0,0,0,3,0,5,0,0,0,0,-2],
            turn: 'host',
            bar: {white: 0, black: 0}
        };
        
        function createGame() {
            const id = Math.random().toString(36).substring(2, 6).toUpperCase();
            initPeer(id);
            myRole = 'host';
            document.getElementById('display-id').innerText = id;
        }
        
        function joinGame() {
            const id = document.getElementById('joinId').value.toUpperCase();
            initPeer();
            myRole = 'guest';
            setTimeout(() => {
                conn = peer.connect(id);
                setupConn();
            }, 1000);
        }
        
        function initPeer(id = null) {
            peer = id ? new Peer(id) : new Peer();
            peer.on('open', (myId) => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game-info').classList.remove('hidden');
                document.getElementById('board').classList.remove('hidden');
                renderBoard();
                if(!id) document.getElementById('display-id').innerText = "Connecting...";
            });
            peer.on('connection', (c) => {
                conn = c;
                setupConn();
            });
        }
        
        function setupConn() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "Connected! Game On.";
                renderBoard();
            });
            conn.on('data', (data) => {
                gameState = data;
                renderBoard();
            });
        }
        
        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            console.log('renderBoard called, gameState:', gameState);
            
            // Top row: points 24-13 (right to left)
            const topRow = document.createElement('div');
            topRow.className = 'board-row top-half';
            for(let i=23; i>=12; i--) {
                topRow.appendChild(createPoint(i, true));
            }
            boardDiv.appendChild(topRow);
            
            // Bottom row: points 1-12 (left to right)
            const bottomRow = document.createElement('div');
            bottomRow.className = 'board-row bottom-half';
            for(let i=0; i<12; i++) {
                bottomRow.appendChild(createPoint(i, false));
            }
            boardDiv.appendChild(bottomRow);
            
            console.log('Board rendered with', boardDiv.querySelectorAll('.point').length, 'points');
            document.getElementById('status').innerText = `Turn: ${gameState.turn.toUpperCase()}`;
        }
        
        function createPoint(i, isTopHalf) {
            const pt = document.createElement('div');
            pt.className = 'point';
            pt.setAttribute('data-index', i);

            // Photorealistic-ish wood colors
            const isDark = i % 2 === 1;
            const darkBase = '#6b4f36';
            const lightBase = '#e6d3b0';
            const base = isDark ? darkBase : lightBase;

            // SVG container
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 100 240');
            svg.setAttribute('preserveAspectRatio', 'none');
            svg.setAttribute('class', 'triangle-svg');

            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

            const uid = 'u' + i;
            const patternId = 'pattern-' + uid;
            const noiseId = 'noise-' + uid;
            const innerId = 'inner-' + uid;
            const clipId = 'clip-' + uid;

            // Thin stripe pattern
            const pattern = document.createElementNS('http://www.w3.org/2000/svg', 'pattern');
            pattern.setAttribute('id', patternId);
            pattern.setAttribute('patternUnits', 'userSpaceOnUse');
            pattern.setAttribute('width', '4');
            pattern.setAttribute('height', '4');

            // base stripe and narrow dark streak
            const pRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            pRect.setAttribute('x', '0');
            pRect.setAttribute('y', '0');
            pRect.setAttribute('width', '4');
            pRect.setAttribute('height', '4');
            pRect.setAttribute('fill', base);
            pattern.appendChild(pRect);

            const stripe = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            stripe.setAttribute('x', '1.6');
            stripe.setAttribute('y', '0');
            stripe.setAttribute('width', '0.8');
            stripe.setAttribute('height', '4');
            stripe.setAttribute('fill', shadeColor(base, -18));
            stripe.setAttribute('opacity', '0.25');
            pattern.appendChild(stripe);

            defs.appendChild(pattern);

            // turbulence noise for subtle grain overlay
            const filterNoise = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
            filterNoise.setAttribute('id', noiseId);
            const turb = document.createElementNS('http://www.w3.org/2000/svg', 'feTurbulence');
            turb.setAttribute('type', 'fractalNoise');
            turb.setAttribute('baseFrequency', '0.8');
            turb.setAttribute('numOctaves', '2');
            turb.setAttribute('result', 'turb');
            filterNoise.appendChild(turb);
            const col = document.createElementNS('http://www.w3.org/2000/svg', 'feColorMatrix');
            col.setAttribute('in', 'turb');
            col.setAttribute('type', 'saturate');
            col.setAttribute('values', '0');
            col.setAttribute('result', 'mono');
            filterNoise.appendChild(col);
            defs.appendChild(filterNoise);

            // inner shadow filter
            const filterInner = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
            filterInner.setAttribute('id', innerId);
            filterInner.setAttribute('x', '-20%');
            filterInner.setAttribute('y', '-20%');
            filterInner.setAttribute('width', '140%');
            filterInner.setAttribute('height', '140%');
            const feOffset = document.createElementNS('http://www.w3.org/2000/svg', 'feOffset');
            feOffset.setAttribute('dx', '0');
            feOffset.setAttribute('dy', '2');
            feOffset.setAttribute('result', 'off');
            const feGauss = document.createElementNS('http://www.w3.org/2000/svg', 'feGaussianBlur');
            feGauss.setAttribute('in', 'off');
            feGauss.setAttribute('stdDeviation', '3');
            feGauss.setAttribute('result', 'blur');
            const feComp = document.createElementNS('http://www.w3.org/2000/svg', 'feComposite');
            feComp.setAttribute('in', 'blur');
            feComp.setAttribute('in2', 'SourceAlpha');
            feComp.setAttribute('operator', 'arithmetic');
            feComp.setAttribute('k1', '0');
            feComp.setAttribute('k2', '1');
            feComp.setAttribute('k3', '-1');
            feComp.setAttribute('k4', '0');
            feComp.setAttribute('result', 'inner');
            const feColor = document.createElementNS('http://www.w3.org/2000/svg', 'feFlood');
            feColor.setAttribute('flood-color', 'rgba(0,0,0,0.28)');
            feColor.setAttribute('result', 'flood');
            const feComp2 = document.createElementNS('http://www.w3.org/2000/svg', 'feComposite');
            feComp2.setAttribute('in', 'flood');
            feComp2.setAttribute('in2', 'inner');
            feComp2.setAttribute('operator', 'in');
            feComp2.setAttribute('result', 'innerColor');
            const feBlend = document.createElementNS('http://www.w3.org/2000/svg', 'feBlend');
            feBlend.setAttribute('in', 'SourceGraphic');
            feBlend.setAttribute('in2', 'innerColor');
            feBlend.setAttribute('mode', 'normal');
            filterInner.appendChild(feOffset);
            filterInner.appendChild(feGauss);
            filterInner.appendChild(feComp);
            filterInner.appendChild(feColor);
            filterInner.appendChild(feComp2);
            filterInner.appendChild(feBlend);
            defs.appendChild(filterInner);

            // clip path triangle for crisp pattern edges
            const clip = document.createElementNS('http://www.w3.org/2000/svg', 'clipPath');
            clip.setAttribute('id', clipId);
            const clipPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            if(isTopHalf) clipPath.setAttribute('d', 'M 15 0 L 85 0 L 100 240 L 0 240 Z');
            else clipPath.setAttribute('d', 'M 0 0 L 100 0 L 85 240 L 15 240 Z');
            clip.appendChild(clipPath);
            defs.appendChild(clip);

            svg.appendChild(defs);

            // main triangle filled with pattern
            const main = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            if(isTopHalf) main.setAttribute('d', 'M 15 0 L 85 0 L 100 240 L 0 240 Z');
            else main.setAttribute('d', 'M 0 0 L 100 0 L 85 240 L 15 240 Z');
            main.setAttribute('fill', 'url(#' + patternId + ')');
            main.setAttribute('clip-path', 'url(#' + clipId + ')');
            svg.appendChild(main);

            // subtle noise overlay
            const noiseRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            noiseRect.setAttribute('x', '0');
            noiseRect.setAttribute('y', '0');
            noiseRect.setAttribute('width', '100');
            noiseRect.setAttribute('height', '240');
            noiseRect.setAttribute('filter', 'url(#' + noiseId + ')');
            noiseRect.setAttribute('opacity', '0.06');
            noiseRect.setAttribute('clip-path', 'url(#' + clipId + ')');
            svg.appendChild(noiseRect);

            // inner shadow
            main.setAttribute('filter', 'url(#' + innerId + ')');

            // highlight overlay (bevel)
            const hv = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
            const hvId = 'hv-' + uid;
            hv.setAttribute('id', hvId);
            hv.setAttribute('x1', '0'); hv.setAttribute('y1', '0'); hv.setAttribute('x2', '0'); hv.setAttribute('y2', '1');
            const hvA = document.createElementNS('http://www.w3.org/2000/svg', 'stop'); hvA.setAttribute('offset','0%'); hvA.setAttribute('stop-color','rgba(255,255,255,0.12)');
            const hvB = document.createElementNS('http://www.w3.org/2000/svg', 'stop'); hvB.setAttribute('offset','60%'); hvB.setAttribute('stop-color','rgba(255,255,255,0)');
            hv.appendChild(hvA); hv.appendChild(hvB);
            defs.appendChild(hv);

            const bevel = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            if(isTopHalf) bevel.setAttribute('d', 'M 15 0 L 85 0 L 100 240 L 0 240 Z');
            else bevel.setAttribute('d', 'M 0 0 L 100 0 L 85 240 L 15 240 Z');
            bevel.setAttribute('fill', 'url(#' + hvId + ')');
            bevel.setAttribute('opacity', '0.6');
            bevel.setAttribute('clip-path', 'url(#' + clipId + ')');
            svg.appendChild(bevel);

            // thin stroke for definition
            const outline = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            if(isTopHalf) outline.setAttribute('d', 'M 15 0 L 85 0 L 100 240 L 0 240 Z');
            else outline.setAttribute('d', 'M 0 0 L 100 0 L 85 240 L 15 240 Z');
            outline.setAttribute('fill', 'none');
            outline.setAttribute('stroke', 'rgba(0,0,0,0.45)');
            outline.setAttribute('stroke-width', '0.9');
            svg.appendChild(outline);

            pt.appendChild(svg);

            // Create checkers container
            const checkersDiv = document.createElement('div');
            checkersDiv.className = 'checkers';

            const val = gameState.board[i];
            const count = Math.abs(val);
            const color = val > 0 ? 'white' : 'black';

            for(let n=0; n<count && n<6; n++) {
                const checker = document.createElement('div');
                checker.className = `checker ${color}`;
                checkersDiv.appendChild(checker);
            }

            pt.appendChild(checkersDiv);

            const label = document.createElement('div');
            label.className = 'point-label';
            label.textContent = i+1;
            pt.appendChild(label);

            pt.onclick = () => handlePointClick(i);
            return pt;
        }

        // Utility: shade a hex color by percent (-100..100)
        function shadeColor(hex, percent) {
            const h = hex.replace('#','');
            const r = parseInt(h.substring(0,2),16);
            const g = parseInt(h.substring(2,4),16);
            const b = parseInt(h.substring(4,6),16);
            const t = percent < 0 ? 0 : 255;
            const p = Math.abs(percent) / 100;
            const R = Math.round((t - r) * p) + r;
            const G = Math.round((t - g) * p) + g;
            const B = Math.round((t - b) * p) + b;
            return '#' + ((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1);
        }
        
        let selectedPoint = null;
        function handlePointClick(i) {
            if(gameState.turn !== myRole) return;
            
            if(selectedPoint === null) {
                if(gameState.board[i] === 0) return;
                selectedPoint = i;
                document.querySelector(`.point[data-index="${i}"]`).classList.add('selected');
            } else {
                const piece = gameState.board[selectedPoint] > 0 ? 1 : -1;
                gameState.board[selectedPoint] -= piece;
                gameState.board[i] += piece;
                
                gameState.turn = myRole === 'host' ? 'guest' : 'host';
                document.querySelector(`.point[data-index="${selectedPoint}"]`).classList.remove('selected');
                selectedPoint = null;
                sync();
            }
        }
        
        function rollDice() {
            if(gameState.turn !== myRole) return;
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-val').innerText = `${d1} • ${d2}`;
        }
        
        function sync() {
            renderBoard();
            if(conn) conn.send(gameState);
        }
    </script>
</body>
</html>
