<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgammon P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background: #2a2420;
            color: white;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }
        
        h1 {
            font-size: 2.5rem;
            margin: 10px 0 20px;
            color: #d4af37;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        #board {
            width: 900px;
            max-width: 95vw;
            margin: 30px auto;
            background: linear-gradient(90deg, 
                #7A6B52 0%,
                #8B7355 8%,
                #7A6B52 12%,
                #9D8B72 18%,
                #8B7355 24%,
                #7A6B52 28%,
                #8B7355 35%,
                #7A6B52 40%,
                #9D8B72 46%,
                #8B7355 52%,
                #7A6B52 56%,
                #8B7355 63%,
                #7A6B52 68%,
                #9D8B72 74%,
                #8B7355 80%,
                #7A6B52 84%,
                #8B7355 92%,
                #7A6B52 100%
            );
            padding: 15px;
            border-radius: 0;
            border: 22px solid #54483d;
            box-shadow: 0 40px 100px rgba(0,0,0,0.95), inset 0 1px 0 rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        
        .board-row {
            display: flex;
            gap: 0;
            height: 220px;
            flex: 1;
            position: relative;
        }
        
        .point {
            flex: 1;
            position: relative;
            cursor: pointer;
            transition: filter 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        
        /* Create triangle using borders */
        .point::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }
        
        .top-half .point::before {
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-top: 190px solid;
        }
        
        .bottom-half .point::before {
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-bottom: 190px solid;
            bottom: 0;
            top: auto;
        }
        
        /* Dark triangles (odd positions) */
        .point:nth-child(odd)::before {
            border-top-color: #654321;
            border-bottom-color: #654321;
        }
        
        /* Light triangles (even positions) */
        .point:nth-child(even)::before {
            border-top-color: #D2A679;
            border-bottom-color: #D2A679;
        }
        
        .checkers {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            width: 50px;
            pointer-events: none;
            position: relative;
            z-index: 10;
            margin-top: 8px;
        }
        
        .bottom-half .checkers {
            flex-direction: column-reverse;
            margin-top: 0;
            margin-bottom: 8px;
        }
        
        .checker {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 8px 16px rgba(0,0,0,0.8),
                inset -2px -2px 4px rgba(0,0,0,0.5),
                inset 2px 2px 4px rgba(255,255,255,0.15);
            cursor: grab;
            pointer-events: auto;
            transition: transform 0.15s ease;
            position: relative;
            margin: -15px 0;
        }
        
        .checker:hover {
            transform: scale(1.12) translateY(-3px);
            box-shadow: 
                0 12px 24px rgba(0,0,0,0.9),
                inset -2px -2px 4px rgba(0,0,0,0.5),
                inset 2px 2px 4px rgba(255,255,255,0.2);
        }
        
        .checker:active {
            cursor: grabbing;
        }
        
        .white {
            background: radial-gradient(circle at 35% 35%, #FFFAF0 0%, #F5E6D3 25%, #E0CCAD 55%, #D4B896 100%);
            border: 4px solid #C9A961;
        }
        
        .black {
            background: radial-gradient(circle at 35% 35%, #3a3a2a 0%, #1a1a10 35%, #0a0a00 70%, #000000 100%);
            border: 4px solid #1a1a0a;
        }
        
        .point-label {
            position: absolute;
            font-size: 0.5rem;
            font-weight: bold;
            color: rgba(255,255,255,0.15);
            z-index: 5;
            bottom: 2px;
        }
        
        .top-half .point-label {
            top: 2px;
            bottom: auto;
        }
        
        #setup, #game-info {
            background: linear-gradient(135deg, #2a2a3a 0%, #3a3a4a 100%);
            padding: 30px;
            border-radius: 8px;
            max-width: 380px;
            margin: 30px auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 3px solid #d4af37;
        }
        
        #setup p, #game-info p {
            margin: 12px 0;
            font-size: 0.95rem;
        }
        
        #display-id {
            color: #d4af37;
            font-family: monospace;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }
        
        #status {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        #dice-container {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            border: 1px solid #d4af3755;
        }
        
        #dice-val {
            display: block;
            font-size: 1.5rem;
            margin-top: 10px;
            color: #d4af37;
            letter-spacing: 2px;
            font-weight: bold;
        }
        
        input {
            padding: 10px 12px;
            font-size: 0.95rem;
            border-radius: 4px;
            border: 2px solid #d4af37;
            background: rgba(212, 175, 55, 0.08);
            color: white;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 250px;
            margin: 10px auto;
            text-transform: uppercase;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        input:focus {
            outline: none;
            border-color: #f0e68c;
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        button {
            padding: 11px 28px;
            font-size: 0.95rem;
            border-radius: 4px;
            border: 2px solid #d4af37;
            margin: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #d4af37 0%, #dcc068 100%);
            color: #1a1410;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        
        button:hover {
            background: linear-gradient(135deg, #dcc068 0%, #d4af37 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.45);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .point.selected {
            filter: opacity(1) drop-shadow(0 0 20px rgba(212, 175, 55, 1));
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>BACKGAMMON</h1>
    
    <div id="setup">
        <button onclick="createGame()">Create Game (Host)</button>
        <p>OR</p>
        <input type="text" id="joinId" placeholder="Enter 4-Letter ID">
        <button onclick="joinGame()">Join Game</button>
    </div>
    
    <div id="game-info" class="hidden">
        <p>Your ID: <strong id="display-id">...</strong></p>
        <p id="status">Waiting for player...</p>
        <div id="dice-container">
            <button id="roll-btn" onclick="rollDice()">Roll Dice</button>
            <span id="dice-val"></span>
        </div>
    </div>
    
    <div id="board" class="hidden"></div>
    
    <script>
        let peer, conn;
        let myRole = 'host';
        let gameState = {
            board: [2,0,0,0,0,-5,0,-3,0,0,0,5,-5,0,0,0,3,0,5,0,0,0,0,-2],
            turn: 'host',
            bar: {white: 0, black: 0}
        };
        
        function createGame() {
            const id = Math.random().toString(36).substring(2, 6).toUpperCase();
            initPeer(id);
            myRole = 'host';
            document.getElementById('display-id').innerText = id;
        }
        
        function joinGame() {
            const id = document.getElementById('joinId').value.toUpperCase();
            initPeer();
            myRole = 'guest';
            setTimeout(() => {
                conn = peer.connect(id);
                setupConn();
            }, 1000);
        }
        
        function initPeer(id = null) {
            peer = id ? new Peer(id) : new Peer();
            peer.on('open', (myId) => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game-info').classList.remove('hidden');
                document.getElementById('board').classList.remove('hidden');
                renderBoard();
                if(!id) document.getElementById('display-id').innerText = "Connecting...";
            });
            peer.on('connection', (c) => {
                conn = c;
                setupConn();
            });
        }
        
        function setupConn() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "Connected! Game On.";
                renderBoard();
            });
            conn.on('data', (data) => {
                gameState = data;
                renderBoard();
            });
        }
        
        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            
            // Top row: points 24-13 (right to left)
            const topRow = document.createElement('div');
            topRow.className = 'board-row top-half';
            for(let i=23; i>=12; i--) {
                topRow.appendChild(createPoint(i));
            }
            boardDiv.appendChild(topRow);
            
            // Bottom row: points 1-12 (left to right)
            const bottomRow = document.createElement('div');
            bottomRow.className = 'board-row bottom-half';
            for(let i=0; i<12; i++) {
                bottomRow.appendChild(createPoint(i));
            }
            boardDiv.appendChild(bottomRow);
            
            document.getElementById('status').innerText = `Turn: ${gameState.turn.toUpperCase()}`;
        }
        
        function createPoint(i) {
            const pt = document.createElement('div');
            pt.className = 'point';
            pt.setAttribute('data-index', i);
            
            const checkersDiv = document.createElement('div');
            checkersDiv.className = 'checkers';
            
            const val = gameState.board[i];
            const count = Math.abs(val);
            const color = val > 0 ? 'white' : 'black';
            
            for(let n=0; n<count && n<6; n++) {
                const checker = document.createElement('div');
                checker.className = `checker ${color}`;
                checkersDiv.appendChild(checker);
            }
            
            pt.appendChild(checkersDiv);
            
            const label = document.createElement('div');
            label.className = 'point-label';
            label.textContent = i+1;
            pt.appendChild(label);
            
            pt.onclick = () => handlePointClick(i);
            return pt;
        }
        
        let selectedPoint = null;
        function handlePointClick(i) {
            if(gameState.turn !== myRole) return;
            
            if(selectedPoint === null) {
                if(gameState.board[i] === 0) return;
                selectedPoint = i;
                document.querySelector(`.point[data-index="${i}"]`).classList.add('selected');
            } else {
                const piece = gameState.board[selectedPoint] > 0 ? 1 : -1;
                gameState.board[selectedPoint] -= piece;
                gameState.board[i] += piece;
                
                gameState.turn = myRole === 'host' ? 'guest' : 'host';
                document.querySelector(`.point[data-index="${selectedPoint}"]`).classList.remove('selected');
                selectedPoint = null;
                sync();
            }
        }
        
        function rollDice() {
            if(gameState.turn !== myRole) return;
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-val').innerText = `${d1} • ${d2}`;
        }
        
        function sync() {
            renderBoard();
            if(conn) conn.send(gameState);
        }
    </script>
</body>
</html>
