<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgammon P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background: linear-gradient(180deg, #1a1410 0%, #2d2925 50%, #1a1410 100%);
            color: white;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }
        
        h1 {
            font-size: 2.5rem;
            margin: 10px 0 20px;
            color: #d4af37;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        #board {
            width: 960px;
            max-width: 96vw;
            margin: 30px auto;
            background: linear-gradient(90deg, #c9a96a 0%, #d4b896 2%, #a89968 5%, #d4b896 7%, #b89960 10%, #d4b896 12%, #a68f5e 15%, #d4b896 18%, #c9a96a 20%, #a89968 22%, #d4b896 25%, #b89960 27%, #d4b896 30%, #a68f5e 32%, #d4b896 35%, #c9a96a 37%, #a89968 40%, #d4b896 42%, #b89960 45%, #d4b896 47%, #a68f5e 50%, #d4b896 52%, #c9a96a 55%, #a89968 57%, #d4b896 60%, #b89960 62%, #d4b896 65%, #a68f5e 67%, #d4b896 70%, #c9a96a 72%, #a89968 75%, #d4b896 77%, #b89960 80%, #d4b896 82%, #a68f5e 85%, #d4b896 87%, #c9a96a 90%, #a89968 92%, #d4b896 95%, #b89960 100%);
            padding: 25px;
            border-radius: 4px;
            border: 16px solid #6d5d45;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .board-row {
            display: flex;
            gap: 2px;
            height: 210px;
            flex: 1;
        }
        
        .point {
            flex: 1;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 8px;
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 1px,
                    rgba(0,0,0,0.08) 1px,
                    rgba(0,0,0,0.08) 2px,
                    transparent 2px,
                    transparent 3px,
                    rgba(255,255,255,0.02) 3px,
                    rgba(255,255,255,0.02) 4px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent 0px,
                    transparent 2px,
                    rgba(0,0,0,0.04) 2px,
                    rgba(0,0,0,0.04) 3px
                ),
                linear-gradient(180deg, #d4b896 0%, #c9a96a 50%, #a89968 100%);
        }
        
        .point.light {
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 1px,
                    rgba(0,0,0,0.04) 1px,
                    rgba(0,0,0,0.04) 2px,
                    transparent 2px,
                    transparent 3px,
                    rgba(255,255,255,0.03) 3px,
                    rgba(255,255,255,0.03) 4px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent 0px,
                    transparent 2px,
                    rgba(0,0,0,0.02) 2px,
                    rgba(0,0,0,0.02) 3px
                ),
                linear-gradient(180deg, #e8d4a8 0%, #d4b896 50%, #b89968 100%);
        }
        
        .point:hover {
            filter: brightness(1.18) drop-shadow(0 0 10px rgba(212,175,55,0.7));
        }
        
        .point.selected {
            filter: drop-shadow(0 0 18px rgba(212, 175, 55, 1)) brightness(1.3);
            z-index: 10;
        }
        
        .checkers {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            width: 100%;
            pointer-events: none;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .bottom-half .checkers {
            flex-direction: column-reverse;
        }
        
        .checker {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 8px 20px rgba(0,0,0,0.85),
                inset -3px -3px 8px rgba(0,0,0,0.6),
                inset 2px 2px 8px rgba(255,255,255,0.2),
                inset 0 0 10px rgba(0,0,0,0.5);
            cursor: grab;
            pointer-events: auto;
            transition: transform 0.12s ease;
            position: relative;
            margin: -12px 0;
        }
        
        .checker:hover {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 
                0 10px 25px rgba(0,0,0,0.9),
                inset -3px -3px 8px rgba(0,0,0,0.6),
                inset 2px 2px 8px rgba(255,255,255,0.3);
        }
        
        .checker:active {
            cursor: grabbing;
            box-shadow: 
                0 3px 8px rgba(0,0,0,0.8),
                inset -3px -3px 8px rgba(0,0,0,0.6),
                inset 2px 2px 8px rgba(255,255,255,0.2);
        }
        
        .white {
            background: radial-gradient(circle at 35% 35%, #fcfaf6 0%, #ede4c8 22%, #dcc9a3 50%, #cdb87f 100%);
            border: 4px solid #b39f6f;
        }
        
        .black {
            background: radial-gradient(circle at 35% 35%, #3f3f2f 0%, #1f1f15 28%, #0a0a06 60%, #000000 100%);
            border: 4px solid #2a2a1a;
        }
        
        .point-label {
            position: absolute;
            font-size: 0.55rem;
            font-weight: bold;
            color: rgba(0,0,0,0.25);
            z-index: 4;
            bottom: 3px;
            letter-spacing: 0.5px;
        }
        
        .top-half .point-label {
            top: 3px;
            bottom: auto;
        }
        
        #setup, #game-info {
            background: linear-gradient(135deg, #2a2a3a 0%, #3a3a4a 100%);
            padding: 30px;
            border-radius: 8px;
            max-width: 380px;
            margin: 30px auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 3px solid #d4af37;
        }
        
        #setup p, #game-info p {
            margin: 12px 0;
            font-size: 0.95rem;
        }
        
        #display-id {
            color: #d4af37;
            font-family: monospace;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }
        
        #status {
            color: #aaa;
            font-size: 0.9rem;
        }
        
        #dice-container {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            border: 1px solid #d4af3755;
        }
        
        #dice-val {
            display: block;
            font-size: 1.5rem;
            margin-top: 10px;
            color: #d4af37;
            letter-spacing: 2px;
            font-weight: bold;
        }
        
        input {
            padding: 10px 12px;
            font-size: 0.95rem;
            border-radius: 4px;
            border: 2px solid #d4af37;
            background: rgba(212, 175, 55, 0.08);
            color: white;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 250px;
            margin: 10px auto;
            text-transform: uppercase;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        input:focus {
            outline: none;
            border-color: #f0e68c;
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        button {
            padding: 11px 28px;
            font-size: 0.95rem;
            border-radius: 4px;
            border: 2px solid #d4af37;
            margin: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #d4af37 0%, #dcc068 100%);
            color: #1a1410;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        
        button:hover {
            background: linear-gradient(135deg, #dcc068 0%, #d4af37 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.45);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>BACKGAMMON</h1>
    
    <div id="setup">
        <button onclick="createGame()">Create Game (Host)</button>
        <p>OR</p>
        <input type="text" id="joinId" placeholder="Enter 4-Letter ID">
        <button onclick="joinGame()">Join Game</button>
    </div>
    
    <div id="game-info" class="hidden">
        <p>Your ID: <strong id="display-id">...</strong></p>
        <p id="status">Waiting for player...</p>
        <div id="dice-container">
            <button id="roll-btn" onclick="rollDice()">Roll Dice</button>
            <span id="dice-val"></span>
        </div>
    </div>
    
    <div id="board" class="hidden"></div>
    
    <script>
        let peer, conn;
        let myRole = 'host';
        let gameState = {
            board: [2,0,0,0,0,-5,0,-3,0,0,0,5,-5,0,0,0,3,0,5,0,0,0,0,-2],
            turn: 'host',
            bar: {white: 0, black: 0}
        };
        
        function createGame() {
            const id = Math.random().toString(36).substring(2, 6).toUpperCase();
            initPeer(id);
            myRole = 'host';
            document.getElementById('display-id').innerText = id;
        }
        
        function joinGame() {
            const id = document.getElementById('joinId').value.toUpperCase();
            initPeer();
            myRole = 'guest';
            setTimeout(() => {
                conn = peer.connect(id);
                setupConn();
            }, 1000);
        }
        
        function initPeer(id = null) {
            peer = id ? new Peer(id) : new Peer();
            peer.on('open', (myId) => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game-info').classList.remove('hidden');
                document.getElementById('board').classList.remove('hidden');
                renderBoard();
                if(!id) document.getElementById('display-id').innerText = "Connecting...";
            });
            peer.on('connection', (c) => {
                conn = c;
                setupConn();
            });
        }
        
        function setupConn() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "Connected! Game On.";
                renderBoard();
            });
            conn.on('data', (data) => {
                gameState = data;
                renderBoard();
            });
        }
        
        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            
            // Top row: points 24-13 (right to left)
            const topRow = document.createElement('div');
            topRow.className = 'board-row top-half';
            for(let i=23; i>=12; i--) {
                topRow.appendChild(createPoint(i));
            }
            boardDiv.appendChild(topRow);
            
            // Bottom row: points 1-12 (left to right)
            const bottomRow = document.createElement('div');
            bottomRow.className = 'board-row bottom-half';
            for(let i=0; i<12; i++) {
                bottomRow.appendChild(createPoint(i));
            }
            boardDiv.appendChild(bottomRow);
            
            document.getElementById('status').innerText = `Turn: ${gameState.turn.toUpperCase()}`;
        }
        
        function createPoint(i) {
            const pt = document.createElement('div');
            pt.className = 'point';
            if(i % 2 === 0) pt.classList.add('light');
            pt.setAttribute('data-index', i);
            
            const checkersDiv = document.createElement('div');
            checkersDiv.className = 'checkers';
            
            const val = gameState.board[i];
            const count = Math.abs(val);
            const color = val > 0 ? 'white' : 'black';
            
            for(let n=0; n<count && n<6; n++) {
                const checker = document.createElement('div');
                checker.className = `checker ${color}`;
                checkersDiv.appendChild(checker);
            }
            
            pt.appendChild(checkersDiv);
            
            const label = document.createElement('div');
            label.className = 'point-label';
            label.textContent = i+1;
            pt.appendChild(label);
            
            pt.onclick = () => handlePointClick(i);
            return pt;
        }
        
        let selectedPoint = null;
        function handlePointClick(i) {
            if(gameState.turn !== myRole) return;
            
            if(selectedPoint === null) {
                if(gameState.board[i] === 0) return;
                selectedPoint = i;
                document.querySelector(`.point[data-index="${i}"]`).classList.add('selected');
            } else {
                const piece = gameState.board[selectedPoint] > 0 ? 1 : -1;
                gameState.board[selectedPoint] -= piece;
                gameState.board[i] += piece;
                
                gameState.turn = myRole === 'host' ? 'guest' : 'host';
                document.querySelector(`.point[data-index="${selectedPoint}"]`).classList.remove('selected');
                selectedPoint = null;
                sync();
            }
        }
        
        function rollDice() {
            if(gameState.turn !== myRole) return;
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-val').innerText = `${d1} • ${d2}`;
        }
        
        function sync() {
            renderBoard();
            if(conn) conn.send(gameState);
        }
    </script>
</body>
</html>
