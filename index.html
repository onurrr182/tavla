<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Backgammon</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(180deg, #0f1419 0%, #1a1f2e 50%, #0f1419 100%);
            color: white;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            font-size: 3rem;
            margin: 20px 0 40px;
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        #board {
            display: flex;
            flex-direction: column;
            width: 1000px;
            max-width: 98vw;
            margin: 30px auto;
            background: linear-gradient(to right, #8B7355 0%, #A0826D 50%, #8B7355 100%);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.15);
            border: 12px solid #5d4e37;
            gap: 0;
        }
        .board-row {
            display: flex;
            gap: 2px;
            justify-content: center;
            height: 160px;
        }
        .point {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 48px;
            height: 160px;
            position: relative;
        }
        .point-triangle {
            width: 0;
            height: 0;
            border-left: 24px solid transparent;
            border-right: 24px solid transparent;
            border-top: 120px solid rgba(0, 0, 0, 0.3);
        }
        .point:nth-child(odd) .point-triangle {
            border-top-color: rgba(60, 40, 20, 0.4);
        }
        .point:nth-child(even) .point-triangle {
            border-top-color: rgba(40, 25, 10, 0.5);
        }
        .point:hover .point-triangle {
            filter: brightness(1.3);
        }
        .point.selected .point-triangle {
            filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.9));
        }
        .point small {
            position: absolute;
            bottom: 8px;
            font-size: 0.65rem;
            opacity: 0.6;
        }
        .checker {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            margin: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6), inset -3px -3px 8px rgba(0,0,0,0.5), inset 3px 3px 8px rgba(255,255,255,0.15);
            transition: all 0.2s ease;
            cursor: grab;
        }
        .checker:active {
            cursor: grabbing;
        }
        .white {
            background: radial-gradient(circle at 35% 35%, #fefdfb 0%, #e8dcc0 30%, #d4b896 100%);
            border: 3px solid #c9a961;
            box-shadow: 0 8px 16px rgba(0,0,0,0.7), inset -2px -2px 5px rgba(0,0,0,0.3), inset 2px 2px 5px rgba(255,255,255,0.3);
        }
        .black {
            background: radial-gradient(circle at 35% 35%, #2a2a2a 0%, #0f0f0f 50%, #000 100%);
            border: 3px solid #555;
            box-shadow: 0 8px 16px rgba(0,0,0,0.7), inset -2px -2px 5px rgba(255,255,255,0.1), inset 2px 2px 5px rgba(0,0,0,0.5);
        }
        #setup, #game-info {
            background: linear-gradient(135deg, rgba(26,26,46,0.95) 0%, rgba(42,42,62,0.95) 100%);
            padding: 40px;
            border-radius: 4px;
            max-width: 420px;
            margin: 40px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(212,175,55,0.2);
            backdrop-filter: blur(10px);
            border: 2px solid #d4af37;
        }
        #setup p, #game-info p {
            margin: 15px 0;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }
        #display-id {
            color: #d4af37;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        #status {
            color: #a0a0a0;
            font-size: 0.95rem;
        }
        #dice-container {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            border: 1px solid #d4af3744;
        }
        #dice-val {
            display: block;
            font-size: 2rem;
            margin-top: 15px;
            font-weight: bold;
            color: #d4af37;
            letter-spacing: 2px;
        }
        input {
            padding: 14px 16px;
            font-size: 1rem;
            border-radius: 4px;
            border: 2px solid #d4af37;
            background: rgba(212,175,55,0.05);
            color: white;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 280px;
            margin: 12px auto;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        input:focus {
            outline: none;
            border-color: #f0e68c;
            background: rgba(212,175,55,0.15);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        input::placeholder {
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }
        button {
            padding: 14px 32px;
            font-size: 1rem;
            border-radius: 4px;
            border: 2px solid #d4af37;
            margin: 12px;
            cursor: pointer;
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            color: #0f1419;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
        }
        button:hover {
            background: linear-gradient(135deg, #f0e68c 0%, #d4af37 100%);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
        }
        button:active {
            transform: translateY(-1px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Backgammon P2P</h1>

    <div id="setup">
        <button onclick="createGame()">Create Game (Host)</button>
        <p>OR</p>
        <input type="text" id="joinId" placeholder="Enter 4-Letter ID">
        <button onclick="joinGame()">Join Game</button>
    </div>

    <div id="game-info" class="hidden">
        <p>Your ID: <strong id="display-id">...</strong></p>
        <p id="status">Waiting for player...</p>
        <div id="dice-container">
            <button id="roll-btn" onclick="rollDice()">Roll Dice</button>
            <span id="dice-val"></span>
        </div>
    </div>

    <div id="board" class="hidden"></div>

    <script>
        let peer, conn;
        let myRole = 'host'; // default for local play
        let gameState = {
            board: [2,0,0,0,0,-5,0,-3,0,0,0,5,-5,0,0,0,3,0,5,0,0,0,0,-2], // Standard start
            turn: 'host',
            bar: {white: 0, black: 0}
        };

        // --- P2P Logic ---
        function createGame() {
            const id = Math.random().toString(36).substring(2, 6).toUpperCase();
            initPeer(id);
            myRole = 'host';
            document.getElementById('display-id').innerText = id;
        }

        function joinGame() {
            const id = document.getElementById('joinId').value.toUpperCase();
            initPeer();
            myRole = 'guest';
            setTimeout(() => {
                conn = peer.connect(id);
                setupConn();
            }, 1000);
        }

        function initPeer(id = null) {
            peer = id ? new Peer(id) : new Peer();
            peer.on('open', (myId) => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game-info').classList.remove('hidden');
                document.getElementById('board').classList.remove('hidden');
                renderBoard();
                if(!id) document.getElementById('display-id').innerText = "Connecting...";
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConn();
            });
        }

        function setupConn() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "Connected! Game On.";
                renderBoard();
            });
            conn.on('data', (data) => {
                gameState = data;
                renderBoard();
            });
        }

        // --- Game Logic ---
        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            // Top row: points 13-24 (indices 12-23), right to left
            const topRow = document.createElement('div');
            topRow.className = 'board-row';
            topRow.style.flexDirection = 'row-reverse';
            for(let i=23; i>=12; i--) {
                const pt = createPoint(i);
                topRow.appendChild(pt);
            }
            boardDiv.appendChild(topRow);
            // Bar
            const bar = document.createElement('div');
            bar.className = 'point';
            bar.style.height = '260px';
            bar.style.margin = '0 0';
            bar.innerHTML = '<small style="top: 5px; bottom: auto;">BAR</small>';
            const barWhite = gameState.bar.white;
            const barBlack = gameState.bar.black;
            bar.style.display = 'flex';
            bar.style.flexDirection = 'column';
            bar.style.justifyContent = 'space-around';
            const whiteBarDiv = document.createElement('div');
            whiteBarDiv.style.display = 'flex';
            whiteBarDiv.style.flexDirection = 'column';
            whiteBarDiv.style.alignItems = 'center';
            for(let n=0; n<barWhite; n++) {
                const checker = document.createElement('div');
                checker.className = 'checker white';
                whiteBarDiv.appendChild(checker);
            }
            bar.appendChild(whiteBarDiv);
            const blackBarDiv = document.createElement('div');
            blackBarDiv.style.display = 'flex';
            blackBarDiv.style.flexDirection = 'column';
            blackBarDiv.style.alignItems = 'center';
            for(let n=0; n<barBlack; n++) {
                const checker = document.createElement('div');
                checker.className = 'checker black';
                blackBarDiv.appendChild(checker);
            }
            bar.appendChild(blackBarDiv);
            boardDiv.appendChild(bar);
            // Bottom row: points 1-12 (indices 0-11), left to right
            const bottomRow = document.createElement('div');
            bottomRow.className = 'board-row';
            for(let i=0; i<12; i++) {
                const pt = createPoint(i);
                bottomRow.appendChild(pt);
            }
            boardDiv.appendChild(bottomRow);
            const status = document.getElementById('status').innerText = `Turn: ${gameState.turn.toUpperCase()}`;
        }

        function createPoint(i) {
            const pt = document.createElement('div');
            pt.className = 'point';
            pt.setAttribute('data-index', i);
            pt.innerHTML = `<small style="position:absolute; bottom:0; color:#999">${i+1}</small>`;
            const val = gameState.board[i];
            const count = Math.abs(val);
            const color = val > 0 ? 'white' : 'black';
            pt.style.flexDirection = (i < 12) ? 'column' : 'column-reverse';
            for(let n=0; n<count; n++) {
                const checker = document.createElement('div');
                checker.className = `checker ${color}`;
                pt.appendChild(checker);
            }
            pt.onclick = () => handlePointClick(i);
            return pt;
        }

        let selectedPoint = null;
        function handlePointClick(i) {
            if (gameState.turn !== myRole) return;

            if (selectedPoint === null) {
                if (gameState.board[i] === 0) return;
                selectedPoint = i;
                document.querySelector(`.point[data-index="${i}"]`).classList.add('selected');
            } else {
                // Move logic (Basic - no rules enforced yet)
                const piece = gameState.board[selectedPoint] > 0 ? 1 : -1;
                gameState.board[selectedPoint] -= piece;
                gameState.board[i] += piece;
                
                gameState.turn = (myRole === 'host') ? 'guest' : 'host';
                document.querySelector(`.point[data-index="${selectedPoint}"]`).classList.remove('selected');
                selectedPoint = null;
                sync();
            }
        }

        function rollDice() {
            if (gameState.turn !== myRole) return;
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-val').innerText = `${d1} • ${d2}`;
        }

        function sync() {
            renderBoard();
            if(conn) conn.send(gameState);
        }
    </script>
</body>
</html>
